<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Success</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #8d92d4;
            color: #1f2937;
        }

        .card {
            width: min(520px, calc(100% - 32px));
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.6;
            color: #4b5563;
        }

        .button-row {
            margin-top: 20px;
        }

        a button {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: #0f766e;
            color: white;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Upload Successful</h1>
        <p>Detected label: <strong>{{ detected_label }}</strong></p>
        <p>Saved path: <strong>{{ saved_path }}</strong></p>

        <div class="button-row">
            <a href="/">
                <button type="button">Back</button>
            </a>
        </div>
    </main>
</body>
</html>
